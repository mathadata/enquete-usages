name: contrats enquête usages
on:
  push:
    paths: ['enquete_usages_2026/**']
  pull_request:
    paths: ['enquete_usages_2026/**']
jobs:
  contrats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: pip install -r requirements.txt
      - run: python3 enquete_usages_2026/transverse/check_contracts.py
