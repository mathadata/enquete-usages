<header>Enquête usages MathAData — architecture &amp; appariement</header>
<h2 id="pourquoi-une-pipeline-et-pas-des-scripts-ad-hoc">Pourquoi une pipeline (et pas des scripts ad hoc)</h2>
<div class="why">
<p><strong>Le problème</strong> : 3 sources · 4 analyses · des dizaines de chiffres publiés · plusieurs sessions. Sans discipline → chaque script redéfinit « classe », « prof », « rétention » → <strong>chiffres qui se contredisent</strong>.</p>
</div>
<div class="row">
<div class="box teal" style="min-width:200px"><b>1</b><span>Définitions<br />canoniques centralisées<br />(GLOSSAIRE)</span></div>
<span class="arr">→</span>
<div class="box teal" style="min-width:200px"><b>2</b><span>Une seule couche<br />de calcul<br />(build_profiles)</span></div>
<span class="arr">→</span>
<div class="box teal" style="min-width:200px"><b>3</b><span>facts_*.json =<br />sources de vérité<br />(on lit, pas recalcul)</span></div>
<span class="arr">→</span>
<div class="box green" style="min-width:200px"><b>4</b><span>Contrats<br />anti-régression<br />(pre-commit + CI)</span></div>
</div>
<p>→ Reproductible (<code>rebuild_all.sh</code>), <strong>idempotent</strong>, vérifiable, <strong>sans PII</strong>.</p>
</section>

<h2 id="anatomie-dune-ligne-capytale-1-ligne--1-clone">Anatomie d'une ligne Capytale (1 ligne = 1 clone)</h2>
<p><code>role</code> = qui <strong>possède</strong> le clone · <code>teacher</code> = qui le <strong>distribue</strong> · <code>student</code> = le propriétaire</p>
<p><strong>① Déploiement direct (« plongée directe ») — 59 % des profs</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>role=student  teacher=a3f8…  student=&lt;élève&gt;  uai_teach=0590X  mathadata_id=3515488   × 28
</code></pre>
<p>→ Mme Martin : <strong>28 lignes role=student, 0 ligne role=teacher</strong>. Visible <strong>seulement</strong> par D/E.</p>
<p><strong>② Prof qui s'auto-teste d'abord</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>role=teacher  teacher=b7c2…  student=b7c2…   (l'auto-test : il est son propre owner)
role=student  teacher=b7c2…  student=&lt;élève&gt; (puis ses élèves)
</code></pre>
<p>→ M. Durand : 1 ligne role=teacher <strong>+</strong> lignes role=student. Visible par A/B.</p>
<p><strong>③ Formation (formateur + stagiaire)</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>role=teacher  teacher=X(formateur)  student=Y(stagiaire)  uai_teach=&lt;X&gt;  uai_el=&lt;Y&gt;
</code></pre>
<p>→ Le stagiaire Y est <code>role=teacher</code>, son id est dans la colonne <code>student</code>. Compté (à tort) par <code>n_teacher_clones</code>.</p>
<div class="why">
<p><strong>Compter un prof = <code>distinct(teacher)</code> sur les lignes <code>role=student</code>.</strong> Les signaux A/B ne voient que les profs de ② (qui ont une ligne <code>role=teacher</code>) → d'où D/E, qui lisent le <strong>vrai enseignement</strong> (<code>role=student</code>) et récupèrent ceux de ①.</p>
</div>
</section>

</div>

<h2 id="do%C3%B9-viennent-les-rubans--3-r%C3%A9gimes-de-confiance">D'où viennent les rubans : 3 régimes de confiance</h2>
<p>Pour chacun des <strong>260 profs Capytale</strong>, <code>build_profiles.classify()</code> attribue canal + formation :</p>
<div class="row">
<div class="box green" style="min-width:200px"><b>74</b><span>canal · <b>individuel</b><br />appariement 1:1 (A/B/D/E)</span></div>
<div class="box teal" style="min-width:200px"><b>46</b><span>canal · <b>proxy_etab</b><br />collègue au même UAI (moyenne d'étab.)</span></div>
<div class="box orange" style="min-width:200px"><b>140</b><span>canal · <b>aucune</b> (54 %)<br />défaut → capytale_direct</span></div>
</div>
<div class="row">
<div class="box green" style="min-width:200px"><b>40</b><span>formation · individuel</span></div>
<div class="box teal" style="min-width:200px"><b>27</b><span>formation · proxy_etab</span></div>
<div class="box orange" style="min-width:200px"><b>193</b><span>formation · aucune → « jamais »</span></div>
</div>
<div class="lim">
<p><strong>Seuls ~28 % des profs (74/260) ont un lien 1:1.</strong> 18 % par <strong>moyenne d'établissement</strong>, <strong>54 % par défaut</strong>. → « capytale_direct » et « jamais formé » sont des <strong>bornes</strong> : elles incluent « on n'a pas vu de trace », pas seulement « prouvé absent ». D'où le ruban <strong>estimé</strong>.</p>
</div>
<div class="why">
<p><strong>Sankey « formé → profondeur »</strong> : porte sur les <strong>67 profs Capytale tagués formés</strong> (≠ 631 site) → 9 test · 7 sous-seuil · 24 usage unique · 27 usage multiple. La conversion « formation→classe » (59/30/10 %) est, elle, au <strong>grain établissement</strong> (agrégé).</p>
</div>

<h2 id="les-autres-options--et-pourquoi-pas-pour-linstant">Les autres options — et pourquoi pas (pour l'instant)</h2>
<table>
<thead>
<tr>
<th>Option alternative</th>
<th>Pourquoi écartée</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Clé commune via Capytale</strong> (id / e-mail hashé partagé)</td>
<td>Gouvernance/RGPD : anonyme par conception. <em>La vraie solution long terme.</em></td>
</tr>
<tr>
<td><strong>Record linkage probabiliste</strong> (Fellegi-Sunter, scoring pondéré)</td>
<td>Aucun champ nominatif côté Capytale à comparer — seuls partagés : UAI + activité + temps</td>
</tr>
<tr>
<td><strong>Fuzzy matching</strong> sur nom étab/prof</td>
<td>Pas de nom côté Capytale ; l'UAI est déjà exact</td>
</tr>
<tr>
<td><strong>Classifieur ML supervisé</strong></td>
<td>Pas de <strong>vérité terrain</strong> (aucune paire certifiée pour entraîner/valider)</td>
</tr>
<tr>
<td><strong>Score bayésien continu</strong></td>
<td>Possible, mais opaque — préféré : règles déterministes auditables + conf. A/B</td>
</tr>
</tbody>
</table>
<div class="why">
<p><strong>Notre choix</strong> : règles déterministes <strong>conservatrices</strong> (déclenchées sur l'unicité seule), confiance <strong>signalée</strong>, <strong>calibrées</strong> sur cas connus. Transparence &amp; zéro faux positif PII &gt; rappel maximal — vu l'enjeu et l'absence de vérité terrain.</p>
</div>

<header>Enquête usages MathAData — architecture &amp; appariement</header>
<h2 id="urlr--basthon--le-m%C3%AAme-probl%C3%A8me-%C3%A0-lextr%C3%AAme">URLR / Basthon : le même problème, à l'extrême</h2>
<div class="why">
<p><strong>Pourquoi</strong> : Capytale ne voit pas l'usage <b>sans compte</b> (liens courts Basthon). Combien d'usage passe par ce canal ?</p>
</div>
<div class="row">
<div class="box teal"><b>6</b><span>liens</span></div>
<div class="box teal"><b>1 213</b><span>clics</span></div>
<div class="box teal"><b>206</b><span>séances estimées</span></div>
<div class="box"><b>12</b><span>classes (uniques ≥5)</span></div>
<div class="box orange"><b>44</b><span>classes (NAT-élargi)</span></div>
</div>
<ul>
<li>Séance estimée = run d'heures actives même lien, débuts &lt; 3 h (même logique que Capytale).</li>
<li>Taille <code>n_visiteurs_uniques_urlr</code> — <strong>non additive</strong>, clé de dédup <strong>non documentée</strong>, <strong>IP anonymisées</strong> → un <strong>NAT d'établissement sous-compte une classe</strong> (clics/unique : 2,97, jusqu'à 6,3).</li>
<li>Parades : <strong>proxy par clics</strong> (1 clic = 1 participation, exploratoire) + <strong>NAT-suspect</strong> (≤4 uniques mais ≥10 clics).</li>
<li>Croisement Capytale <strong>national &amp; inféré</strong> (chevauchement temporel) : modes <em>remplacement</em> / <em>dépannage</em> <strong>compatibles</strong> — jamais une attribution certaine.</li>
</ul>
</section>

<table>
<thead>
<tr>
<th><img class="emoji" draggable="false" alt="✅" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2705.svg" data-marp-twemoji=""/> Permet</th>

</tr>

<tr>

  --ink:#1d3557; --blue:#2a6f97; --teal:#48cae4; --tealbg:#e7f6fb;
  --orange:#e76f51; --orangebg:#fff1ec; --green:#2a9d8f; --greenbg:#e9f7f4;
  --grey:#e0e4ea;
}
section { font-size: 23px; padding: 40px 52px; color:#222; }
h1 { color: var(--ink); font-size: 42px; }
h2 { color: var(--ink); font-size: 32px; border-bottom: 2px solid var(--grey); padding-bottom: 5px; margin-bottom:14px;}
h3 { color: var(--blue); margin:6px 0; }
strong { color: var(--ink); }
code { background: #f1f3f6; font-size:0.85em; }
table { font-size: 19px; }
.small { font-size: 17px; color:#566; }
.why { background:var(--tealbg); border-left:5px solid var(--blue); padding:8px 14px; font-size:20px; }
.lim { background:var(--orangebg); border-left:5px solid var(--orange); padding:8px 14px; font-size:20px; }
section.lead { background:var(--ink); color:#fff; }
section.lead h1, section.lead h2, section.lead h3 { color:#fff; border:none; }
section.part { background:var(--blue); color:#fff; justify-content:center;}
section.part h1, section.part h2 { color:#fff; border:none;}
/* --- diagram toolkit --- */
.row { display:flex; align-items:center; justify-content:center; gap:8px; flex-wrap:wrap; margin:6px 0;}
.col { display:flex; flex-direction:column; gap:8px; }
.box { border-radius:10px; padding:9px 13px; background:#fff; border:2px solid var(--blue); text-align:center; min-width:90px;}
.box b { display:block; font-size:26px; color:var(--ink); line-height:1.1;}
.box span { font-size:15px; color:#566; }
/* inline emphasis inside flowing-text boxes must NOT become a block stat number */
.box span b { display:inline; font-size:inherit; color:inherit; font-weight:700; line-height:inherit;}
.box.desc { text-align:left; }
.box.desc b { display:inline; font-size:inherit; color:var(--ink); font-weight:700; line-height:inherit;}
.box.ink{ background:var(--ink); color:#fff; border-color:var(--ink);} .box.ink b,.box.ink span{color:#fff;}
.box.blue{ background:var(--blue); color:#fff; border-color:var(--blue);} .box.blue b,.box.blue span{color:#fff;}
.box.teal{ background:var(--tealbg); border-color:var(--teal);}
.box.orange{ background:var(--orangebg); border-color:var(--orange);} .box.orange b{color:var(--orange);}
.box.green{ background:var(--greenbg); border-color:var(--green);} .box.green b{color:var(--green);}
.box.ghost{ background:#fafbfc; border-style:dashed; border-color:#aab;}
.arr { font-size:26px; color:var(--blue); font-weight:bold; }
.arrx { font-size:24px; color:var(--orange); font-weight:bold; }
.bar { background:var(--grey); border-radius:6px; height:30px; margin:4px 0; overflow:hidden;}
.bar i { display:block; height:100%; background:var(--blue); color:#fff; font-style:normal; line-height:30px; padding-left:10px; white-space:nowrap; font-size:17px;}
.bar i.hi{ background:var(--green);} .bar i.lo{ background:var(--orange);}
.tag{ display:inline-block; background:var(--ink); color:#fff; border-radius:5px; padding:1px 8px; font-size:15px;}
/* compact slide (dense code blocks) */
section.tight { font-size:20px; padding-top:28px; }
section.tight h2 { margin-bottom:8px; }
section.tight p { margin:5px 0; }
section.tight pre { font-size:13px; margin:5px 0; padding:7px 12px; line-height:1.25; }
section.tight .why { font-size:18px; padding:6px 12px; }
